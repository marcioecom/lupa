services:
  postgres:
    image: postgres:16-alpine
    container_name: wagner-etl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wagner
      POSTGRES_PASSWORD: wagner
      POSTGRES_DB: wagner_etl
    ports:
      - "5433:5432"
    volumes:
      - wagner_etl_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wagner -d wagner_etl"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  wagner_etl_pgdata:
