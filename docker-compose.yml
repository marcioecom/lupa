services:
  postgres:
    image: postgres:16-alpine
    container_name: lupa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lupa
      POSTGRES_PASSWORD: lupa
      POSTGRES_DB: lupa
    ports:
      - "5433:5432"
    volumes:
      - lupa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lupa -d lupa"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  lupa_pgdata:
