apiVersion: v1
kind: Namespace
metadata:
  name: lupa
---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: lupa-secrets
  namespace: lupa
spec:
  hostAPI: https://app.infisical.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: lupa-km-vu
        envSlug: prod
        secretsPath: "/"
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: lupa-secret
      secretNamespace: lupa
      creationPolicy: "Orphan"
---
apiVersion: v1
kind: Service
metadata:
  name: lupa-postgres
  namespace: lupa
  labels:
    app.kubernetes.io/name: lupa
    app.kubernetes.io/component: postgres
spec:
  selector:
    app.kubernetes.io/name: lupa
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lupa-postgres
  namespace: lupa
  labels:
    app.kubernetes.io/name: lupa
    app.kubernetes.io/component: postgres
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  serviceName: lupa-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lupa
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lupa
        app.kubernetes.io/component: postgres
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: lupa-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lupa-app
  namespace: lupa
  labels:
    app.kubernetes.io/name: lupa
    app.kubernetes.io/component: api
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: lupa
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lupa
        app.kubernetes.io/component: api
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      initContainers:
        - name: db-push
          image: ghcr.io/marcioecom/lupa:latest
          imagePullPolicy: Always
          command: ["pnpm", "db:push", "--force"]
          envFrom:
            - secretRef:
                name: lupa-secret
      containers:
        - name: app
          image: ghcr.io/marcioecom/lupa:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: lupa-secret
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: lupa-app
  namespace: lupa
  labels:
    app.kubernetes.io/name: lupa
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: lupa
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lupa
  namespace: lupa
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: lupa.marcio.run
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lupa-app
                port:
                  number: 80
