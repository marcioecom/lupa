name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NAMESPACE: lupa

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_CLIENT_SECRET }}
          tags: tag:ci

      - name: Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.36.2"

      - name: Deploy to K3s
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          set -euo pipefail

          kubectl apply -f k8s-manifests.yaml

          # garante o Postgres pronto antes da app; senao o initContainer db-push
          # fica repetindo ate o banco conectar (funciona, mas gera ruido no 1o deploy)
          kubectl -n "$NAMESPACE" rollout status statefulset/lupa-postgres --timeout=180s

          # imagem imutavel pelo SHA (init db-push + app juntos). com strategy Recreate
          # o proprio set image ja dispara o rollout, sem precisar de scale 0/1.
          kubectl -n "$NAMESPACE" set image deployment/lupa-app db-push="$IMAGE" app="$IMAGE"
          kubectl -n "$NAMESPACE" rollout status deployment/lupa-app --timeout=180s
          kubectl -n "$NAMESPACE" get pods -l app.kubernetes.io/name=lupa
